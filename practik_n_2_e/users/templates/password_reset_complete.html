{% extends "layout.html" %}

{% block content %}

    <div class="w-full max-w-xl rounded-2xl bg-gray-800 p-8 shadow-xl text-center">

        <h1 class="text-3xl font-bold text-white mb-4">
            Пароль змінено
        </h1>

        <p class="text-gray-400 mb-6">
            Ваш пароль успішно змінено. Тепер можете увійти, використовуючи новий пароль.
        </p>

        <a href="{% url 'users:login' %}"
           class="inline-block rounded-lg bg-indigo-600 px-6 py-3 font-semibold text-white transition hover:bg-indigo-500">
            Увійти
        </a>

    </div>
</div>
{% endblock %}
