{% extends "layout.html" %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-900 px-4">
    <div class="w-full max-w-xl rounded-2xl bg-gray-800 p-8 shadow-xl text-center">

        <h1 class="text-3xl font-bold text-white mb-4">
            Перевірте пошту
        </h1>

        <p class="text-gray-400">
            Якщо вказана пошта зареєстрована в системі, на неї надіслано посилання для відновлення пароля.
        </p>

        <a href="{% url 'users:login' %}"
           class="mt-6 inline-block font-semibold text-indigo-400 hover:text-indigo-300">
            Повернутися до входу
        </a>

    </div>
</div>
{% endblock %}
